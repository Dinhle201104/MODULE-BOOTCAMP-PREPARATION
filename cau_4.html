<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Câu 4: Quản lý công nhân</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body onload="hienThiTrangList()">

    <h2>Quản lý công nhân</h2>
    
    <button onclick="sapXepVaHienThi()">Sắp xếp theo họ và tên</button>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ và tên</th>
                <th>Ngày sinh</th>
                <th>Địa chỉ</th>
                <th>Lương</th>
                <th>Chức vụ</th>
            </tr>
        </thead>
        <tbody id="danhSachCongNhan"></tbody>
    </table>

<script>
    class CongNhan {
        constructor(stt, hoVaTen, ngaySinh, diaChi, luong, chucVu) {
            this.stt = stt;
            this.hoVaTen = hoVaTen;
            this.ngaySinh = ngaySinh;
            this.diaChi = diaChi;
            this.luong = luong;
            this.chucVu = chucVu;
        }
    }

    let danhSach = [
        new CongNhan(1, "Trương Tân A", "11-11-1997", "Quảng Nam", 2000, "Abc"),
        new CongNhan(2, "Trương Tấn B", "11-11-1998", "Đà Nẵng", 2000, "Abc"),
        new CongNhan(3, "Trương Tân C", "11-11-1999", "Huế", 2000, "Abc")
    ];

    function hienThiTrangList() {
        let tbody = document.getElementById("danhSachCongNhan");
        let chuoiHtml = "";

        for (let i = 0; i < danhSach.length; i++) {
            let cn = danhSach[i];
            chuoiHtml += "<tr>" +
                            "<td>" + cn.stt + "</td>" +
                            "<td>" + cn.hoVaTen + "</td>" +
                            "<td>" + cn.ngaySinh + "</td>" +
                            "<td>" + cn.diaChi + "</td>" +
                            "<td>" + cn.luong + "</td>" +
                            "<td>" + cn.chucVu + "</td>" +
                         "</tr>";
        }
        
        tbody.innerHTML = chuoiHtml;
    }

    function sapXepVaHienThi() {
        for (let i = 0; i < danhSach.length - 1; i++) {
            for (let j = i + 1; j < danhSach.length; j++) {
                
                if (danhSach[i].hoVaTen.localeCompare(danhSach[j].hoVaTen) > 0) {
                    let bienTam = danhSach[i];
                    danhSach[i] = danhSach[j];
                    danhSach[j] = bienTam;
                }
                
            }
        }

        for (let i = 0; i < danhSach.length; i++) {
            danhSach[i].stt = i + 1;
        }

        hienThiTrangList();
    }
</script>

</body>
</html>
